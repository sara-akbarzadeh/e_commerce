# Leapcell Deployment Configuration
# This file configures the deployment settings for Leapcell.io
# For more info: https://leapcell.io/docs

name: e-commerce
runtime: python3.11

# Environment variables (set these in Leapcell dashboard)
env:
  - SECRET_KEY: ${SECRET_KEY}
  - DATABASE_PATH: ecommerce.db
  - PORT: 5000
  - TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

# Build commands
build:
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - python init_db.py

# Start command
start: gunicorn -w 4 -b 0.0.0.0:$PORT app:app

# Health check endpoint
healthcheck:
  path: /
  interval: 30
