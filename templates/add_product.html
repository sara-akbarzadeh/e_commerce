{% extends "base.html" %}
{% block title %}افزودن محصول{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="fw-bold mb-1">افزودن محصول</h3>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('products') }}">
    <i class="bi bi-arrow-right ms-1"></i> بازگشت
  </a>
</div>

<div class="card app-card">
  <div class="card-body">
    <form method="POST" class="row g-3">
      <div class="col-12 col-md-6">
        <label class="form-label">نام محصول *</label>
        <input name="name" class="form-control" required>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">دسته‌بندی *</label>
        <input name="category" class="form-control" required placeholder="مثلاً: الکترونیک، پوشاک، ...">
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">قیمت *</label>
        <input name="price" type="number" step="0.01" min="0" class="form-control" required>
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">موجودی *</label>
        <input name="stock_quantity" type="number" min="0" class="form-control" value="0" required>
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">آدرس تصویر</label>
        <input name="image_url" type="url" class="form-control" placeholder="https://...">
      </div>
      <div class="col-12">
        <label class="form-label">توضیحات</label>
        <textarea name="description" class="form-control" rows="3"></textarea>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-success">
          <i class="bi bi-check2-circle ms-1"></i> ذخیره
        </button>
        <a class="btn btn-outline-secondary" href="{{ url_for('products') }}">انصراف</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
