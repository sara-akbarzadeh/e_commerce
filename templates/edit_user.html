{% extends "base.html" %}
{% block title %}ویرایش کاربر{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="fw-bold mb-1">ویرایش کاربر</h3>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('users') if current_user.role == 'admin' else url_for('profile') }}">
    <i class="bi bi-arrow-right ms-1"></i> بازگشت
  </a>
</div>

<div class="card app-card">
  <div class="card-body">
    <form method="POST" class="row g-3">
      <div class="col-12 col-md-6">
        <label class="form-label">نام کاربری</label>
        <input class="form-control" value="{{ user.username }}" disabled>
        <small class="text-muted">نام کاربری قابل تغییر نیست</small>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">ایمیل *</label>
        <input name="email" type="email" class="form-control" value="{{ user.email }}" required>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">نام کامل *</label>
        <input name="full_name" class="form-control" value="{{ user.full_name }}" required>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">رمز عبور جدید</label>
        <input name="password" type="password" class="form-control" placeholder="خالی بگذارید برای عدم تغییر">
        <small class="text-muted">در صورت عدم تغییر خالی بگذارید</small>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">تلفن</label>
        <input name="phone" class="form-control" value="{{ user.phone or '' }}">
      </div>
      {% if current_user.role == 'admin' %}
      <div class="col-12 col-md-6">
        <label class="form-label">نقش</label>
        <select name="role" class="form-select">
          <option value="customer" {% if user.role=='customer' %}selected{% endif %}>مشتری</option>
          <option value="admin" {% if user.role=='admin' %}selected{% endif %}>مدیر</option>
        </select>
      </div>
      {% endif %}
      <div class="col-12">
        <label class="form-label">آدرس</label>
        <textarea name="address" class="form-control" rows="2">{{ user.address or '' }}</textarea>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary">
          <i class="bi bi-check2-circle ms-1"></i> ذخیره
        </button>
        <a class="btn btn-outline-secondary" href="{{ url_for('users') if current_user.role == 'admin' else url_for('profile') }}">انصراف</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
