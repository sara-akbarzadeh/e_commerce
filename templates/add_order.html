{% extends "base.html" %}
{% block title %}ثبت سفارش{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="fw-bold mb-1">ثبت سفارش</h3>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('orders') }}">
    <i class="bi bi-arrow-right ms-1"></i> بازگشت
  </a>
</div>

<div class="card app-card">
  <div class="card-body">
    <form method="POST" class="row g-3" id="orderForm">
      <div class="col-12 col-md-6">
        <label class="form-label">کاربر *</label>
        <select name="user_id" class="form-select" required>
          <option value="" disabled selected>انتخاب کنید...</option>
          {% for u in users %}
            <option value="{{ u.user_id }}">{{ u.full_name }} ({{ u.username }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">مبلغ کل *</label>
        <input name="total_amount" type="number" step="0.01" class="form-control" required>
      </div>
      <div class="col-12">
        <label class="form-label">آدرس ارسال</label>
        <textarea name="shipping_address" class="form-control" rows="2"></textarea>
      </div>
      <div class="col-12">
        <label class="form-label">محصولات *</label>
        <div class="row g-2">
          {% for p in products %}
            <div class="col-12 col-md-6 col-lg-4">
              <div class="card">
                <div class="card-body">
                  <div class="form-check">
                    <input class="form-check-input product-checkbox" type="checkbox" 
                           name="product_ids" value="{{ p.product_id }}" 
                           data-price="{{ p.price }}">
                    <label class="form-check-label w-100">
                      <span class="fw-semibold">{{ p.name }}</span>
                      <span class="text-muted small d-block">{{ p.category }}</span>
                      <span class="text-primary fw-bold">قیمت: {{ "{:,.0f}".format(p.price|float) }}</span>
                    </label>
                  </div>
                  <div class="mt-2 product-inputs" style="display: none;">
                    <input type="number" name="quantities" class="form-control form-control-sm mb-1" 
                           placeholder="تعداد" min="1" value="1">
                    <input type="number" name="prices" class="form-control form-control-sm" 
                           placeholder="قیمت واحد" step="0.01" value="{{ p.price }}">
                  </div>
                </div>
              </div>
            </div>
          {% endfor %}
        </div>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-warning">
          <i class="bi bi-check2-circle ms-1"></i> ثبت سفارش
        </button>
        <a class="btn btn-outline-secondary" href="{{ url_for('orders') }}">انصراف</a>
      </div>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const checkboxes = document.querySelectorAll('.product-checkbox');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const inputs = this.closest('.card').querySelector('.product-inputs');
            if (this.checked) {
                inputs.style.display = 'block';
            } else {
                inputs.style.display = 'none';
            }
        });
    });
});
</script>
{% endblock %}
